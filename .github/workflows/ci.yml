name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck → Lint → Test → Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Dummy values — build only checks compilation, not runtime connectivity
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

      - name: Bundle budget check
        run: |
          # Main JS bundle must stay under 700 KB (uncompressed)
          MAIN_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || stat -f%z dist/assets/index-*.js)
          MAIN_KB=$((MAIN_SIZE / 1024))
          echo "Main bundle: ${MAIN_KB} KB"
          if [ "$MAIN_KB" -gt 700 ]; then
            echo "::error::Main bundle (${MAIN_KB} KB) exceeds 700 KB budget"
            exit 1
          fi

          # Total JS must stay under 2500 KB
          TOTAL_SIZE=$(find dist/assets -name '*.js' -exec stat -c%s {} + 2>/dev/null | awk '{s+=$1}END{print s}' || find dist/assets -name '*.js' -exec stat -f%z {} + | awk '{s+=$1}END{print s}')
          TOTAL_KB=$((TOTAL_SIZE / 1024))
          echo "Total JS: ${TOTAL_KB} KB"
          if [ "$TOTAL_KB" -gt 2500 ]; then
            echo "::error::Total JS (${TOTAL_KB} KB) exceeds 2500 KB budget"
            exit 1
          fi

          echo "✅ Bundle budgets OK (main: ${MAIN_KB} KB / 700 KB, total: ${TOTAL_KB} KB / 2500 KB)"
